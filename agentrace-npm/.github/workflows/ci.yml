name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: node bin/agentrace.js --version
      - run: node bin/agentrace.js --help
      - run: |
          mkdir -p ~/.agentrace/traces
          echo '{"trace_id":"ci001","run_name":"ci_test","started_at":"2025-01-01T00:00:00Z","status":"completed","total_duration_ms":100,"total_tokens":50,"total_cost_usd":0,"error":null,"steps":[]}' > ~/.agentrace/traces/ci001.json
          node bin/agentrace.js traces
      - run: |
          set +e
          node bin/agentrace.js unknowncmd
          status=$?
          if [ $status -ne 1 ]; then exit 1; fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node --check bin/agentrace.js
      - run: node --check src/server.js
      - run: node --check src/commands/ui.js
      - run: node --check src/commands/traces.js
      - run: node --check src/commands/clear.js
